name: Deploy to VM

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          debug: true
          script: |
            echo "Connected to VM successfully!"
            cd ${{ secrets.VM_TARGET_DIR }}
            echo "Current directory: $(pwd)"
            git fetch --all
            git reset --hard origin/main
            chmod +x deploy.sh
            if ! ./deploy.sh; then
              echo "❌ Deployment failed! Printing backend logs for troubleshooting..."
              docker compose logs backend --tail 50
              exit 1
            fi
